<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配送判定・詳細版</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f7f6; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #result { margin-top: 20px; padding: 15px; border-radius: 6px; font-weight: bold; line-height: 1.5; }
        .alert { color: #856404; background-color: #fff3cd; border: 1px solid #ffeeba; }
        .ok { color: #155724; background-color: #d4edda; border: 1px solid #c3e6cb; }
        .delay { color: #721c24; background-color: #f8d7da; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🚚 配送判定（市町村詳細版）</h2>
        <p>お届け先を入力してください</p>
        <input type="text" id="addressInput" placeholder="例：青森県十和田市、福岡市、小笠原村" onkeydown="if(event.key==='Enter') check()">
        <button onclick="check()">判定する</button>
        <div id="result"></div>
    </div>

    <script>
        // 基本の県別日数
        const prefMaster = {
            "東京都":1, "神奈川県":1, "千葉県":1, "埼玉県":1, "茨城県":1, "栃木県":1, "群馬県":1,
            "山梨県":1, "長野県":1, "新潟県":1, "富山県":1, "石川県":1, "福井県":1, "静岡県":1, "愛知県":1, "三重県":1, "岐阜県":1,
            "大阪府":1, "京都府":1, "滋賀県":1, "奈良県":1, "兵庫県":1, "和歌山県":1, "宮城県":1, "山形県":1, "福島県":1,
            "青森県":2, "岩手県":2, "秋田県":2, "鳥取県":2, "島根県":2, "岡山県":2, "広島県":2, "山口県":2,
            "徳島県":2, "香川県":2, "愛媛県":2, "高知県":2, "福岡県":2, "佐賀県":2, "長崎県":2, "熊本県":2, "大分県":2, "宮崎県":2, "鹿児島県":2, "北海道":2,
            "沖縄県":3
        };

        // 【ここがポイント！】市町村単位の例外ルール
        const specialCities = [
            { name: "小笠原", days: 6, note: "定期船の便によります" },
            { name: "伊豆諸島", days: 3, note: "船の運航状況によります" },
            { name: "奄美", days: 4, note: "中継拠点を通るためお時間がかかります" },
            { name: "対馬", days: 4, note: "船便のため時間がかかります" },
            { name: "佐渡", days: 2, note: "新潟港からの船便になります" }
        ];

        function check() {
            const input = document.getElementById('addressInput').value.trim();
            const resultDiv = document.getElementById('result');
            if (!input) return;

            let finalDays = 0;
            let note = "";

            // 1. まず例外市町村リストに当てはまるかチェック
            for (let city of specialCities) {
                if (input.includes(city.name)) {
                    finalDays = city.days;
                    note = city.note;
                    break;
                }
            }

            // 2. 例外になければ、都道府県でチェック
            if (finalDays === 0) {
                for (let pref in prefMaster) {
                    if (input.includes(pref.replace("県","").replace("府","").replace("都","").replace("道",""))) {
                        finalDays = prefMaster[pref];
                        break;
                    }
                }
            }

            if (finalDays === 0) {
                resultDiv.innerHTML = "判定できませんでした。都道府県名を含めて入力してください。";
                resultDiv.className = "alert";
                return;
            }

            // 15時締め切り判定
            const now = new Date();
            const hour = now.getHours();
            if (hour >= 15) finalDays += 1;

            let resultHtml = `到着予定：<strong>${finalDays}日後</strong>`;
            if (note) resultHtml += `<br><small>※${note}</small>`;
            
            resultDiv.innerHTML = resultHtml;
            resultDiv.className = (finalDays <= 1) ? "ok" : "delay";
        }
    </script>
</body>
</html>
