<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物流配送判定システム</title>
    
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js');
      }
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; padding: 20px; background-color: #f0f2f5; color: #333; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; -webkit-appearance: none; }
        input:focus { border-color: #28a745; border-width: 2px; }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        #result { margin-top: 25px; min-height: 60px; text-align: left; }
        
        /* 候補リスト */
        .candidate-item { background: #fff; border: 1px solid #ddd; padding: 12px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; }
        .candidate-name { font-weight: bold; display: block; margin-bottom: 5px; }
        
        /* 判定ラベルのバッジ色分け */
        .badge { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; color: white; }
        .bg-type1, .bg-type2 { background-color: #28a745; } /* 午前系は緑 */
        .bg-type3, .bg-type5 { background-color: #007bff; } /* 午後系は青 */
        .bg-type4 { background-color: #dc3545; }             /* 翌々日は赤 */
        
        /* 詳細ボックスの色分け */
        .result-detail { padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; margin-bottom: 10px; border-width: 1px; border-style: solid; }
        .type-green { background-color: #e6ffed; border-color: #28a745; color: #28a745; }
        .type-blue { background-color: #e3f2fd; border-color: #007bff; color: #007bff; }
        .type-red { background-color: #fff5f5; border-color: #dc3545; color: #dc3545; }

        #debug-info { font-size: 11px; color: #666; margin-top: 20px; background: #eee; padding: 10px; border-radius: 5px; text-align: left; }
    </style>
</head>
<body>

    <div id="app-screen" class="card">
        <h2>🚚 配送判定</h2>
        <p>地名を入力してください</p>
        <form id="searchForm" action="javascript:void(0);" onsubmit="check();">
            <input type="search" id="addressInput" placeholder="例：清田、栄、沖縄" enterkeyhint="search" autocomplete="off">
            <button type="submit">検索する</button>
        </form>
        <div id="result"></div>
        <div id="debug-info">データを読み込み中...</div>
    </div>

    <script>
        let deliveryData = [];

        window.onload = function() { loadCSV(); };

        async function loadCSV() {
            const debug = document.getElementById('debug-info');
            try {
                const response = await fetch('data.csv');
                const arrayBuffer = await response.arrayBuffer();
                const decoder = new TextDecoder('shift-jis');
                const text = decoder.decode(arrayBuffer);
                const lines = text.split(/\r?\n/);
                
                deliveryData = lines.filter(line => line.trim() !== "").map(line => {
                    const cols = line.split(',').map(c => c.trim());
                    let typeValue = "";
                    // 1〜5のいずれかの数字を後ろから探す
                    for (let i = cols.length - 1; i >= 0; i--) {
                        if (["1", "2", "3", "4", "5"].includes(cols[i])) {
                            typeValue = cols[i];
                            break;
                        }
                    }
                    return {
                        pref: cols[0] || "", city: cols[1] || "", ward: cols[2] || "",
                        full: (cols[0] + cols[1] + cols[2]).replace(/undefined/g, ""),
                        type: typeValue
                    };
                });
                debug.innerHTML = `読込成功: ${deliveryData.length}件`;
            } catch (e) { debug.innerText = `エラー: ${e.message}`; }
        }

        function check() {
            const inputElement = document.getElementById('addressInput');
            const resultDiv = document.getElementById('result');
            const input = inputElement.value.trim();

            // キーボード強制閉じ
            inputElement.blur();
            inputElement.disabled = true;
            setTimeout(() => { inputElement.disabled = false; }, 100);
            document.body.focus();

            if (!input || deliveryData.length === 0) return;

            const keywords = input.split(/[\s　]+/).filter(k => k !== "");
            const matches = deliveryData.filter(item => {
                if (!item.full) return false;
                return keywords.every(keyword => item.full.includes(keyword));
            });

            if (matches.length === 0) {
                resultDiv.innerHTML = "<p style='text-align:center;'>該当データなし</p>";
                return;
            }

            if (matches.length === 1) {
                showDetail(matches[0]);
            } else {
                let html = `<p style="font-size:13px; color:#666;">${matches.length}件見つかりました：</p>`;
                matches.forEach((item) => {
                    const info = getTypeInfo(item.type);
                    const badgeClass = "bg-type" + item.type;
                    html += `
                        <div class="candidate-item" onclick='showSelected(${JSON.stringify(item)})'>
                            <span class="candidate-name">${item.full}</span>
                            <span class="badge ${badgeClass}">${info.label}</span>
                        </div>`;
                });
                resultDiv.innerHTML = html;
            }
        }

        window.showSelected = function(item) { showDetail(item); };

        function showDetail(item) {
            const resultDiv = document.getElementById('result');
            const info = getTypeInfo(item.type);
            resultDiv.innerHTML = `
                <div class="result-detail ${info.boxClass}">
                    <div style="font-size:14px; margin-bottom:5px; color:#555;">${item.full}</div>
                    <div style="font-size:18px;">${info.message}</div>
                </div>
                <button onclick="resetSearch()" style="background-color:#6c757d; font-size:12px; padding:5px; margin-top:10px;">再検索</button>
            `;
            document.activeElement.blur();
        }

        // 1〜5の定義に基づいてメッセージを返す
        function getTypeInfo(type) {
            switch (type) {
                case "1": return { label: "翌日午前", message: "✨ 明日の午前中", boxClass: "type-green" };
                case "2": return { label: "翌日午前*", message: "✨ 明日の午前中<br><small>(一部地域は除く)</small>", boxClass: "type-green" };
                case "3": return { label: "翌日午後", message: "🚚 明日の午後以降", boxClass: "type-blue" };
                case "4": return { label: "翌々日以降", message: "⏳ 翌々日以降の到着", boxClass: "type-red" };
                case "5": return { label: "翌日午後*", message: "🚚 明日の午後以降<br><small>(一部地域は除く)</small>", boxClass: "type-blue" };
                default: return { label: "不明", message: "区分不明 (" + type + ")", boxClass: "" };
            }
        }

        window.resetSearch = function() {
            document.getElementById('addressInput').value = "";
            document.getElementById('result').innerHTML = "";
            document.getElementById('addressInput').focus();
        };
    </script>
</body>
</html>
