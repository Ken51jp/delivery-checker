<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物流配送判定システム（完全版）</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        #login-screen { display: block; }
        #app-screen { display: none; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #result { margin-top: 25px; padding: 15px; border-radius: 8px; font-weight: bold; min-height: 60px; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .type1 { background-color: #e6ffed; color: #28a745; border: 1px solid #28a745; }
        .type2 { background-color: #e3f2fd; color: #007bff; border: 1px solid #007bff; }
        .type3 { background-color: #fff5f5; color: #dc3545; border: 1px solid #dc3545; }
        #debug-info { font-size: 11px; color: #666; margin-top: 20px; background: #eee; padding: 10px; border-radius: 5px; text-align: left; overflow-x: auto; }
    </style>
</head>
<body>

    <div id="login-screen" class="card">
        <h2>🔒 認証</h2>
        <input type="password" id="passInput" placeholder="パスワードを入力">
        <button onclick="login()">ログイン</button>
    </div>

    <div id="app-screen" class="card">
        <h2>🚚 配送判定</h2>
        <input type="text" id="addressInput" placeholder="例：札幌市中央区、鹿児島市">
        <button onclick="check()" style="background-color: #28a745;">判定する</button>
        <div id="result"></div>
        <div id="debug-info">データを準備中...</div>
        <button onclick="location.reload()" style="margin-top: 40px; background-color: #6c757d; font-size: 11px; padding: 5px; width: auto; color: white; border: none; border-radius: 4px;">ログアウト</button>
    </div>

    <script>
        let deliveryData = [];

        function login() {
            const pass = document.getElementById('passInput').value;
            if (btoa(pass) === "NTk2Mw==") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'block';
                loadCSV();
            } else { alert("パスワードが違います。"); }
        }

        async function loadCSV() {
            const debug = document.getElementById('debug-info');
            try {
                const response = await fetch('data.csv');
                const text = await response.text();
                
                // 【対策1】BOM（目に見えないゴミ）を除去
                const cleanText = text.replace(/^\uFEFF/, "");
                const lines = cleanText.split(/\r?\n/);
                
                deliveryData = lines.filter(line => line.trim() !== "").map(line => {
                    const cols = line.split(',').map(c => c.trim());
                    // 【対策2】数字がどの列にあっても「最後の列」を区分として取得
                    const typeValue = cols.slice(-1)[0]; 
                    return {
                        pref: cols[0] || "",
                        city: cols[1] || "",
                        ward: cols[2] || "",
                        full: (cols[0] + cols[1] + cols[2]).replace(/undefined/g, ""),
                        type: typeValue
                    };
                });
                debug.innerHTML = `読込成功: ${deliveryData.length}件<br>1行目の例: ${deliveryData[0].full} → ${deliveryData[0].type}`;
            } catch (e) {
                debug.innerText = `エラー: ${e.message}`;
            }
        }

        function check() {
            const input = document.getElementById('addressInput').value.trim();
            const resultDiv = document.getElementById('result');
            const debug = document.getElementById('debug-info');
            if (!input) return;

            // 【対策3】検索条件を大幅に緩和（住所のどこかが一致すればOK）
            const found = deliveryData.find(item => {
                if (!item.full) return false;
                // CSVの住所が入力に含まれている、または入力がCSVの住所を含んでいる
                return input.includes(item.full) || item.full.includes(input);
            });

            if (!found) {
                resultDiv.innerHTML = "該当データなし";
                resultDiv.className = "";
                // ヒントを表示
                debug.innerHTML += `<br>検索失敗: 「${input}」に合うデータがありませんでした。`;
                return;
            }

            let message = "";
            let className = "";

            if (found.type === "1") {
                message = "✨ 明日の午前中に届きます";
                className = "type1";
            } else if (found.type === "2") {
                message = "🚚 明日の午後以降に届きます";
                className = "type2";
            } else if (found.type === "3") {
                message = "⏳ 翌々日の到着予定です";
                className = "type3";
            } else {
                message = `配送区分不明 (CSVの値: ${found.type})`;
                className = "";
            }

            resultDiv.innerHTML = message + `<br><small style="font-weight:normal;">(判定データ: ${found.full})</small>`;
            resultDiv.className = className;
        }
    </script>
</body>
</html>
