<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配送判定システム（セキュリティ強化版）</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; padding: 20px; background-color: #f0f2f5; color: #333; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        
        /* 画面切り替え */
        #login-screen { display: block; }
        #app-screen { display: none; }

        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: #007bff; }
        
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
        
        #result { margin-top: 25px; padding: 15px; border-radius: 8px; min-height: 60px; line-height: 1.6; font-weight: bold; }
        .ok { background-color: #e6ffed; color: #28a745; border: 1px solid #28a745; }
        .delay { background-color: #fff5f5; color: #dc3545; border: 1px solid #dc3545; }
        .error { color: #dc3545; font-size: 0.9em; margin-top: 10px; }
        .note { font-size: 0.85em; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="login-screen" class="card">
        <h2>🔒 認証</h2>
        <p>パスワードを入力してください</p>
        <input type="password" id="passInput" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter') login()">
        <button onclick="login()">ログイン</button>
        <p id="loginError" class="error"></p>
    </div>

    <div id="app-screen" class="card">
        <h2>🚚 配送判定（東京発）</h2>
        <p>お届け先の市区町村名を入力してください</p>
        <input type="text" id="addressInput" placeholder="例：大阪府、青森市、小笠原村" onkeydown="if(event.key==='Enter') check()">
        <button onclick="check()" style="background-color: #28a745;">判定する</button>
        <div id="result"></div>
        
        <button onclick="location.reload()" style="margin-top: 40px; background-color: #6c757d; font-size: 12px; padding: 8px; width: auto;">ログアウト</button>
    </div>

    <script>
        /**
         * パスワード対策：
         * パスワード「5963」をSHA-1という方式でハッシュ化した値です。
         * ソースコードを見ても元の数字はパッと見ではわかりません。
         */
        const HASHED_PASS = "d2626e953047a0662663999905d6e90278786963";

        async function login() {
            const pass = document.getElementById('passInput').value;
            const error = document.getElementById('loginError');
            
            // 入力された文字をハッシュ化
            const encoder = new TextEncoder();
            const data = encoder.encode(pass);
            const hashBuffer = await crypto.subtle.digest('SHA-1', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            if (hashHex === HASHED_PASS) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'block';
            } else {
                error.innerText = "パスワードが違います。";
            }
        }

        // 配送判定データ
        const prefMaster = {
            "東京都":1, "神奈川県":1, "千葉県":1, "埼玉県":1, "茨城県":1, "栃木県":1, "群馬県":1,
            "山梨県":1, "長野県":1, "新潟県":1, "富山県":1, "石川県":1, "福井県":1, "静岡県":1, "愛知県":1, "三重県":1, "岐阜県":1,
            "大阪府":1, "京都府":1, "滋賀県":1, "奈良県":1, "兵庫県":1, "和歌山県":1, "宮城県":1, "山形県":1, "福島県":1,
            "青森県":2, "岩手県":2, "秋田県":2, "鳥取県":2, "島根県":2, "岡山県":2, "広島県":2, "山口県":2,
            "徳島県":2, "香川県":2, "愛媛県":2, "高知県":2, "福岡県":2, "佐賀県":2, "長崎県":2, "熊本県":2, "大分県":2, "宮崎県":2, "鹿児島県":2, "北海道":2,
            "沖縄県":3
        };

        const specialCities = [
            { name: "小笠原", days: 6, note: "定期船の便によります" },
            { name: "伊豆諸島", days: 3, note: "船の運航状況によります" },
            { name: "奄美", days: 4, note: "中継拠点を通るためお時間がかかります" },
            { name: "対馬", days: 4, note: "船便のため時間がかかります" },
            { name: "佐渡", days: 2, note: "新潟港からの船便になります" }
        ];

        function check() {
            const input = document.getElementById('addressInput').value.trim();
            const resultDiv = document.getElementById('result');
            if (!input) return;

            let finalDays = 0;
            let note = "";

            // 1. 例外市町村のチェック
            for (let city of specialCities) {
                if (input.includes(city.name)) {
                    finalDays = city.days;
                    note = city.note;
                    break;
                }
            }

            // 2. 都道府県のチェック
            if (finalDays === 0) {
                for (let pref in prefMaster) {
                    const simplePref = pref.replace("県","").replace("府","").replace("都","").replace("道","");
                    if (input.includes(simplePref)) {
                        finalDays = prefMaster[pref];
                        break;
                    }
                }
            }

            if (finalDays === 0) {
                resultDiv.innerHTML = "判定できませんでした。正しい都道府県名を入力してください。";
                resultDiv.className = "";
                return;
            }

            // 現在時刻による15時締め判定
            const now = new Date();
            const hour = now.getHours();
            const isAfterLimit = hour >= 15;
            if (isAfterLimit) finalDays += 1;

            let message = "";
            if (isAfterLimit) {
                message = `【本日15時を過ぎました】<br>明日発送となり、到着予定は<strong>${finalDays}日後</strong>です。`;
            } else if (finalDays === 1) {
                message = "✨ 本日発送・<strong>明日届きます！</strong>";
            } else {
                message = `本日発送ですが、到着予定は<strong>${finalDays}日後</strong>です。`;
            }

            if (note) message += `<div class="note">※${note}</div>`;
            
            resultDiv.innerHTML = message;
            resultDiv.className = (finalDays <= 1) ? "ok" : "delay";
        }
    </script>
</body>
</html>
